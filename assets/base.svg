      <rect class="key" x="216" y="0" width="48" height="36"/><text class="text" x="240" y="18">P</text>
      <rect class="key" x="270" y="0" width="48" height="36"/><text class="text" x="294" y="18">BSPC</text>
      <rect class="key" x="0" y="44" width="48" height="36"/><text class="text" x="24" y="62">H</text>
      <rect class="key" x="54" y="44" width="48" height="36"/><text class="text" x="78" y="62">J</text>
      <rect class="key" x="108" y="44" width="48" height="36"/><text class="text" x="132" y="62">K</text>
      <rect class="key" x="162" y="44" width="48" height="36"/><text class="text" x="186" y="62">L</text>
      <rect class="key" x="216" y="44" width="48" height="36"/><text class="text" x="240" y="62">;</text>
      <rect class="key" x="270" y="44" width="48" height="36"/><text class="text" x="294" y="62">'</text>
      <rect class="key" x="0" y="88" width="48" height="36"/><text class="text" x="24" y="106">N</text>
      <rect class="key" x="54" y="88" width="48" height="36"/><text class="text" x="78" y="106">M</text>
      <rect class="key" x="108" y="88" width="48" height="36"/><text class="text" x="132" y="106">,</text>
      <rect class="key" x="162" y="88" width="48" height="36"/><text class="text" x="186" y="106">.</text>
      <rect class="key" x="216" y="88" width="48" height="36"/><text class="text" x="240" y="106">/</text>
      <rect class="key" x="270" y="88" width="48" height="36"/><text class="text" x="294" y="106">ESC</text>
      <rect class="thumb" x="0" y="142" width="60" height="38"/><text class="text" x="30" y="161">RET</text>
      <rect class="thumb accent" x="66" y="142" width="58" height="38"/><text class="text" x="95" y="161">MO2</text>
      <rect class="thumb" x="130" y="142" width="58" height="38"/><text class="text" x="159" y="161">RALT</text>
    </g>
    <g>
      <rect class="combo-box" x="204" y="9" width="18" height="18"/><text class="combo-mark" x="213" y="18">(</text>
      <rect class="combo-box" x="258" y="9" width="18" height="18"/><text class="combo-mark" x="267" y="18">&lt;</text>
      <rect class="combo-box" x="400" y="9" width="18" height="18"/><text class="combo-mark" x="409" y="18">&gt;</text>
      <rect class="combo-box" x="454" y="9" width="18" height="18"/><text class="combo-mark" x="463" y="18">)</text>

