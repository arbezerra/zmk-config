      <rect class="combo-box" x="454" y="53" width="18" height="18"/><text class="combo-mark" x="463" y="62">]</text>

      <rect class="combo-box" x="204" y="97" width="18" height="18"/><text class="combo-mark" x="213" y="106">{</text>
      <rect class="combo-box" x="454" y="97" width="18" height="18"/><text class="combo-mark" x="463" y="106">}</text>

      <line class="combo-line" x1="329" y1="6" x2="240" y2="18"/>
      <line class="combo-line" x1="347" y1="6" x2="436" y2="18"/>
      <rect class="combo-box" x="329" y="-3" width="18" height="18"/><text class="combo-mark" x="338" y="6">+</text>

      <line class="combo-line" x1="344" y1="50" x2="240" y2="62"/>
      <line class="combo-line" x1="347" y1="50" x2="436" y2="62"/>
      <rect class="combo-box" x="329" y="41" width="18" height="18"/><text class="combo-mark" x="338" y="50">=</text>

      <line class="combo-line" x1="329" y1="94" x2="240" y2="106"/>
      <line class="combo-line" x1="347" y1="94" x2="436" y2="106"/>
      <rect class="combo-box" x="329" y="85" width="18" height="18"/><text class="combo-mark" x="338" y="94">-</text>

      <line class="combo-line" x1="329" y1="130" x2="294" y2="106"/>
      <line class="combo-line" x1="347" y1="130" x2="382" y2="106"/>
      <rect class="combo-box" x="329" y="121" width="18" height="18"/><text class="combo-mark" x="338" y="130">_</text>
      
      <line class="combo-line" x1="329" y1="173" x2="223" y2="161"/>
      <line class="combo-line" x1="347" y1="173" x2="453" y2="161"/>
      <rect class="combo-box" x="329" y="164" width="18" height="18"/><text class="combo-mark" x="338" y="173">3</text>
