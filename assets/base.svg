<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" role="img" aria-labelledby="title desc">
  <title id="title">Base layer</title>
  <desc id="desc">Base layer for the Corne ZMK config.</desc>
  <style>
    .bg { fill: #f4efe6; }
    .panel { fill: #fffdf8; stroke: #d8d0c1; stroke-width: 2; }
    .title { font: 700 24px "Iosevka", "Fira Mono", monospace; fill: #2c2822; }
    .subtitle { font: 500 13px "Iosevka", "Fira Mono", monospace; fill: #756d63; }
    .label { font: 700 10px "Iosevka", "Fira Mono", monospace; fill: #9a8e7c; letter-spacing: 1.2px; }
    .key { fill: #fbf6ec; stroke: #8d8378; stroke-width: 1.5; rx: 11; ry: 11; }
    .thumb { fill: #f6eedf; stroke: #8d8378; stroke-width: 1.5; rx: 11; ry: 11; }
    .accent { fill: #e4efd9; stroke: #7a8f5e; }
    .text { font: 700 11px "Iosevka", "Fira Mono", monospace; fill: #2c2822; text-anchor: middle; dominant-baseline: middle; }
    .combo-box { fill: #fff3cf; stroke: #9b8350; stroke-width: 1.5; rx: 6; ry: 6; }
    .combo-line { stroke: #9b8350; stroke-width: 1.5; stroke-linecap: round; }
    .combo-mark { font: 700 11px "Iosevka", "Fira Mono", monospace; fill: #5d4c28; text-anchor: middle; dominant-baseline: middle; }
  </style>
  <rect class="bg" width="760" height="320"/>
  <rect class="panel" x="18" y="18" width="724" height="284" rx="22" ry="22"/>
  <text class="title" x="42" y="50">Base</text>
  <text class="subtitle" x="42" y="72">Default typing layer</text>
  <text class="label" x="173" y="92">LEFT</text>
  <text class="label" x="544" y="92">RIGHT</text>
  <g transform="translate(42,106)">
    <g>
      <rect class="key" x="0" y="0" width="48" height="36"/><text class="text" x="24" y="18">TAB</text>
      <rect class="key" x="54" y="0" width="48" height="36"/><text class="text" x="78" y="18">Q</text>
      <rect class="key" x="108" y="0" width="48" height="36"/><text class="text" x="132" y="18">W</text>
      <rect class="key" x="162" y="0" width="48" height="36"/><text class="text" x="186" y="18">E</text>
      <rect class="key" x="216" y="0" width="48" height="36"/><text class="text" x="240" y="18">R</text>
      <rect class="key" x="270" y="0" width="48" height="36"/><text class="text" x="294" y="18">T</text>
      <rect class="key" x="0" y="44" width="48" height="36"/><text class="text" x="24" y="62">LSFT</text>
      <rect class="key" x="54" y="44" width="48" height="36"/><text class="text" x="78" y="62">A</text>
      <rect class="key" x="108" y="44" width="48" height="36"/><text class="text" x="132" y="62">S</text>
      <rect class="key" x="162" y="44" width="48" height="36"/><text class="text" x="186" y="62">D</text>
      <rect class="key" x="216" y="44" width="48" height="36"/><text class="text" x="240" y="62">F</text>
      <rect class="key" x="270" y="44" width="48" height="36"/><text class="text" x="294" y="62">G</text>
      <rect class="key" x="0" y="88" width="48" height="36"/><text class="text" x="24" y="106">LCTL</text>
      <rect class="key" x="54" y="88" width="48" height="36"/><text class="text" x="78" y="106">Z</text>
      <rect class="key" x="108" y="88" width="48" height="36"/><text class="text" x="132" y="106">X</text>
      <rect class="key" x="162" y="88" width="48" height="36"/><text class="text" x="186" y="106">C</text>
      <rect class="key" x="216" y="88" width="48" height="36"/><text class="text" x="240" y="106">V</text>
      <rect class="key" x="270" y="88" width="48" height="36"/><text class="text" x="294" y="106">B</text>
      <rect class="thumb" x="130" y="142" width="58" height="38"/><text class="text" x="159" y="161">LGUI</text>
      <rect class="thumb accent" x="194" y="142" width="58" height="38"/><text class="text" x="223" y="161">MO1</text>
      <rect class="thumb" x="258" y="142" width="60" height="38"/><text class="text" x="288" y="161">SPACE</text>
    </g>
    <g transform="translate(358,0)">
